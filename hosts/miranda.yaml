# dcli host configuration for miranda
# Generated by donarch installer
# https://gitlab.com/theblackdon/donarch

host: miranda
description: BD-Configs desktop with DankMaterialShell

# Enable compositor modules
enabled_modules:
  - base
  - themes
  - dms
  - apps
  - niri

# Optional applications
packages:
  - zen-browser-bin

# dcli settings
flatpak_scope: user
auto_prune: true
module_processing: sequential
aur_helper: paru
editor: neovim

# Configuration backup settings
config_backups:
  enabled: true
  max_backups: 5

# System backup settings (requires timeshift or snapper)
system_backups:
  enabled: true
  backup_on_sync: true
  backup_on_update: true
  tool: snapper
  snapper_config: root

default_apps: 
  video_player: mpv
  audio_player: mpv
  image_viewer: brave-browser
  pdf_viewer: brave-browser
#  text_editor: neovim
